<!DOCTYPE html>
<html lang="ru-RU" dir="ltr">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Web Calculator</title>
    <link rel="shortcut icon" type="image/x-icon" href="" />
    <link rel="stylesheet" type="text/css" href="styles.css" />
</head>
<body>
    <section class="container">
        <section>
            <form id="calculator">
                <input id="expression" placeholder="0" required disabled />
                <span id="destination">0</span>
            </form>
        </section>
        <section class="keyboard">
            <button></button>
            <button class="del" onclick="cleanAll();">CE</button>
            <button class="del" onclick="cleanDestination();">C</button>
            <button class="del" onclick="backspace();">&larr;</button>

            <button></button>
            <button onclick="leftBracketPlacer();">&lang;</button>
            <button onclick="rightBracketPlacer();">&rang;</button>
            <button onclick="makeOperator('/');">/</button>

            <button class="num" onclick="putNumeric('7');">7</button>
            <button class="num" onclick="putNumeric('8');">8</button>
            <button class="num" onclick="putNumeric('9');">9</button>
            <button onclick="makeOperator('*');">&times;</button>

            <button class="num" onclick="putNumeric('4');">4</button>
            <button class="num" onclick="putNumeric('5');">5</button>
            <button class="num" onclick="putNumeric('6');">6</button>
            <button onclick="makeOperator('-');">&minus;</button>

            <button class="num" onclick="putNumeric('1');">1</button>
            <button class="num" onclick="putNumeric('2');">2</button>
            <button class="num" onclick="putNumeric('3');">3</button>
            <button onclick="makeOperator('+');">+</button>

            <button onclick="plusMinusToggler();">&plusmn;</button>
            <button class="num" onclick="putNumeric('0');">0</button>
            <button onclick="putNumeric('.');">,</button>
            <button class="equal" type="submit" form="calculator">=</button>
        </section>
    </section>

    <!-- scripts zone below -->
    <script src="interface.js"></script>
    <script src="calculator.js"></script>
</body>
</html>
